name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Build & Test ────────────────────────────────────────────────────────────
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --verbosity normal

  # ── Publish self-contained zips ─────────────────────────────────────────────
  publish:
    name: Publish (${{ matrix.rid }})
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    strategy:
      matrix:
        include:
          - rid: win-x64
            zip: Cobalt-windows-x64.zip
          - rid: linux-x64
            zip: Cobalt-linux-x64.zip

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: |
          dotnet publish Cobalt.Watcher/Cobalt.Watcher.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishReadyToRun=true \
            -p:DebugType=embedded \
            -o ./publish/${{ matrix.rid }}

      - name: Zip
        run: |
          cd ./publish/${{ matrix.rid }}
          zip -r ../../${{ matrix.zip }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.zip }}
          path: ./${{ matrix.zip }}

  # ── VirusTotal scan ──────────────────────────────────────────────────────────
  scan:
    name: VirusTotal Scan
    runs-on: ubuntu-latest
    needs: publish
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      analysis: ${{ steps.vt.outputs.analysis }}

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Scan with VirusTotal
        id: vt
        uses: crazy-max/ghaction-virustotal@v4
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          files: |
            ./artifacts/Cobalt-windows-x64.zip/Cobalt-windows-x64.zip
            ./artifacts/Cobalt-linux-x64.zip/Cobalt-linux-x64.zip

  # ── Create GitHub release ───────────────────────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [ publish, scan ]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create GitHub release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          generate_release_notes: true
          files: ./artifacts/**/*.zip

      - name: Add VirusTotal results to release
        uses: actions/github-script@v7
        env:
          ANALYSIS: ${{ needs.scan.outputs.analysis }}
          RELEASE_ID: ${{ steps.release.outputs.id }}
        with:
          script: |
            // analysis is "filename=url,filename=url" — split on first = only since URLs contain =
            const lines = process.env.ANALYSIS.split(',').map(entry => {
              const idx = entry.indexOf('=');
              const name = entry.slice(0, idx);
              const url  = entry.slice(idx + 1);
              return `- [${name}](${url})`;
            }).join('\n');

            const releaseId = parseInt(process.env.RELEASE_ID);
            const { data: release } = await github.rest.repos.getRelease({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              release_id: releaseId,
            });

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              release_id: releaseId,
              body: (release.body || '') + `\n\n## VirusTotal Scan\n${lines}`,
            });
